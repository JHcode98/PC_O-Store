<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Profile - Glamour</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        :root {
            --primary-color: #333;
            --accent-color: #d4af37;
            --bg-color: #f4f4f4;
            --card-bg: #ffffff;
            --success-color: #2ecc71;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--primary-color);
        }
        .header {
            background: var(--card-bg);
            padding: 1rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .profile-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .form-control {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
            box-sizing: border-box;
        }
        .btn-save {
            background-color: var(--success-color);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
        }
        .btn-back {
            display: inline-block;
            margin-bottom: 1rem;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <script>
        // Apply theme on page load
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'pastel-teal') {
            const root = document.documentElement;
            root.style.setProperty('--primary-color', '#004d40'); // Dark Teal
            root.style.setProperty('--secondary-color', '#e0f2f1'); // Light Teal BG
            root.style.setProperty('--accent-color', '#ffab91'); // Soft Coral/Peach
            root.style.setProperty('--bg-color', '#e0f2f1');
        }

        // Security Check
        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>

    <header class="header">
        <h1>Admin Profile</h1>
    </header>

    <div class="container">
        <a href="index.html" class="btn-back">&larr; Back to Dashboard</a>
        
        <div class="profile-card">
            <h2>Update Profile</h2>
            <form onsubmit="updateProfile(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter your name">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <button type="submit" class="btn-save">Save Changes</button>
            </form>
        </div>
    </div>

    <script>
        // Load saved values
        document.getElementById('username').value = localStorage.getItem('adminUsername') || 'Admin';
        document.getElementById('email').value = localStorage.getItem('adminEmail') || 'admin@example.com';

        function updateProfile(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            localStorage.setItem('adminUsername', username);
            localStorage.setItem('adminEmail', email);
            alert("Profile updated successfully!");
        }
    </script>
</body>
</html>
