<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Glamour</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        :root {
            --primary-color: #333;
            --accent-color: #d4af37;
            --bg-color: #f4f4f4;
            --card-bg: #ffffff;
            --danger-color: #e74c3c;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-container h1 {
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }
        .login-container h1 span {
            color: var(--accent-color);
        }
        .login-container p {
            color: #777;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .form-control {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
            box-sizing: border-box;
        }
        .btn-login {
            width: 100%;
            padding: 0.8rem;
            border: none;
            background: var(--accent-color);
            color: white;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn-login:hover {
            background: #c9a130;
        }
        .error-msg {
            color: var(--danger-color);
            margin-top: 1rem;
            display: none;
        }
        .forgot-password-link {
            display: block;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #777;
            text-decoration: none;
        }
        .forgot-password-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <script>
        // Apply theme on page load
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'pastel-teal') {
            const root = document.documentElement;
            root.style.setProperty('--primary-color', '#004d40'); // Dark Teal
            root.style.setProperty('--secondary-color', '#e0f2f1'); // Light Teal BG
            root.style.setProperty('--accent-color', '#ffab91'); // Soft Coral/Peach
            root.style.setProperty('--bg-color', '#e0f2f1');
        }
    </script>
    <div class="login-container">
        <h1 id="loginHeader">Admin<span>Login</span></h1>
        <p id="loginSubtext">Please sign in to manage your store.</p>
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn-login">Sign In</button>
            <p id="errorMsg" class="error-msg">Invalid credentials. Please try again.</p>
            <a href="#" onclick="forgotPassword(event)" class="forgot-password-link">Forgot Password?</a>
        </form>
    </div>

    <script>
        // Display Welcome Back message if username exists
        const savedUsername = localStorage.getItem('adminUsername');
        if (savedUsername) {
            document.getElementById('loginHeader').innerHTML = `Welcome<span>Back</span>`;
            document.getElementById('loginSubtext').innerText = `Hello ${savedUsername}, please sign in.`;
        }

        function handleLogin(event) {
            event.preventDefault(); // Prevent form from reloading the page
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            // Check localStorage for credentials, with defaults
            const storedEmail = (localStorage.getItem('adminEmail') || 'admin@example.com').trim();
            const storedPassword = localStorage.getItem('adminPassword') || 'admin123';

            if (email.toLowerCase() === storedEmail.toLowerCase() && password === storedPassword) {
                // Set a flag in session storage to indicate user is logged in
                sessionStorage.setItem('isLoggedIn', 'true');
                // Redirect to the admin dashboard
                window.location.href = 'index.html';
            } else {
                errorMsg.style.display = 'block';
            }
        }

        function forgotPassword(event) {
            event.preventDefault();
            const storedEmail = localStorage.getItem('adminEmail') || 'admin@example.com';
            const storedPassword = localStorage.getItem('adminPassword') || 'admin123';

            const enteredEmail = prompt("Please enter your admin email address to recover your password:");

            if (enteredEmail && enteredEmail.toLowerCase() === storedEmail.toLowerCase()) {
                alert(`Password recovery:\n\nYour password is: ${storedPassword}\n\nPlease store it securely.`);
            } else if (enteredEmail) {
                alert("The email address you entered does not match our records.");
            }
        }
    </script>
</body>
</html>
